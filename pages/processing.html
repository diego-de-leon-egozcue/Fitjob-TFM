<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitjob — Analizando tu candidatura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    body { overflow-x: hidden; }

    .processing-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
    }

    .processing-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .processing-subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: -20px;
    }

    /* ── Escena de oficina ── */
    .office-scene {
      position: relative;
      width: 100%;
      max-width: 860px;
    }
    #office-canvas {
      width: 100%;
      height: 480px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.07);
      display: block;
      background: #111122;
    }

    /* ── Agentes bajo la escena ── */
    .agents-row {
      display: flex;
      justify-content: space-around;
      width: 100%;
      max-width: 860px;
      gap: 16px;
    }
    .agent-info {
      flex: 1;
      text-align: center;
      padding: 16px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: #1a1a1a;
      transition: border-color 0.3s, background 0.3s;
      min-height: 90px;
    }
    .agent-info.active {
      border-color: #3B82F6;
      background: rgba(59,130,246,0.06);
    }
    .agent-info.done {
      border-color: rgba(59,130,246,0.3);
    }
    .agent-info.error {
      border-color: #EF4444;
      background: rgba(239,68,68,0.06);
    }
    .agent-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    .agent-info.active .agent-name { color: #3B82F6; }
    .agent-info.done .agent-name { color: rgba(59,130,246,0.7); }
    .agent-info.error .agent-name { color: #EF4444; }
    .agent-status {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      line-height: 1.4;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .agent-info.active .agent-status { color: rgba(255,255,255,0.75); }
    .agent-info.done .agent-status { color: rgba(255,255,255,0.4); }
    .agent-info.error .agent-status { color: #EF4444; }

    /* ── Panel de error global ── */
    .error-panel {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 14px;
      padding: 24px 32px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .error-panel.visible { display: block; }
    .error-panel-icon { font-size: 2rem; margin-bottom: 12px; }
    .error-panel-title {
      font-size: 1rem; font-weight: 700;
      color: #EF4444; margin-bottom: 8px;
    }
    .error-panel-msg {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .error-actions { display: flex; gap: 12px; justify-content: center; }
  </style>
</head>
<body>

  <nav class="navbar-inner">
    <a href="/" class="navbar-logo">Fitjob</a>
    <div></div>
    <button class="btn-ghost" onclick="window.location.href='/history'" style="font-size:0.82rem;">Mis ofertas</button>
  </nav>

  <main class="processing-layout">
    <h1 class="processing-title">Tus agentes están trabajando</h1>
    <p class="processing-subtitle">El proceso puede tardar entre 1 y 3 minutos</p>

    <div class="office-scene">
      <canvas id="office-canvas" width="860" height="480"></canvas>
    </div>

    <div class="agents-row">
      <div class="agent-info" id="agent-1-info">
        <div class="agent-name">Analizador</div>
        <div class="agent-status" id="agent-1-status">En espera…</div>
      </div>
      <div class="agent-info" id="agent-2-info">
        <div class="agent-name">Redactor</div>
        <div class="agent-status" id="agent-2-status">En espera…</div>
      </div>
      <div class="agent-info" id="agent-3-info">
        <div class="agent-name">Optimizador de CV</div>
        <div class="agent-status" id="agent-3-status">En espera…</div>
      </div>
    </div>

    <div class="error-panel" id="error-panel">
      <div class="error-panel-icon">⚠️</div>
      <div class="error-panel-title" id="error-panel-title">Ha ocurrido un error</div>
      <p class="error-panel-msg" id="error-panel-msg"></p>
      <div class="error-actions">
        <button class="btn-ghost" onclick="window.location.href='/onboarding'">Volver atrás</button>
        <button class="btn-primary" onclick="reintentar()">Reintentar</button>
      </div>
    </div>
  </main>

  <script src="/static/js/processing.js" defer></script>
</body>
</html>
